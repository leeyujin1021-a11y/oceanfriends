<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Friends - Find Your Ocean Friend</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Find Your Ocean Friend</h1>
            <p>Meet your sea companion for today!</p>
        </header>

        <main id="result-area">
            <div id="emoji-display">❓</div>
            <div id="description-display">Click the button below!</div>
        </main>

        <section class="action-area">
            <button id="draw-btn">Draw Ocean Friend</button>
        </section>

        <footer>
            <p>&copy; 2026 Ocean Friends. Stay Cool!</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
